name: Read Csv

on:
  push:
    paths:
      - 'models/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
  workflow_dispatch:

jobs:
  run-workflow:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas snowflake-connector-python openpyxl dbt-snowflake

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          default:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                schema: ${{ secrets.SNOWFLAKE_SCHEMA }}
                threads: 4
          EOF

      - name: Run dbt Models
        run: |
          dbt deps
          dbt run

      - name: Run Python Script
        run: python python.py

      - name: Commit and Push Generated Excel
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data_comp.xlsx
          git commit -m "Auto-generate Excel report from workflow" || echo "No changes to commit"
          git push

      - name: Trigger Email
        run: python Email.py
