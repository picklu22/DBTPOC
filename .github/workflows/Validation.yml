name: Read Csv

on:
  push: 
    paths:
      - 'models/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest

    permissions:
      contents: write   

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install pandas snowflake-connector-python openpyxl

      - name: Run Python Script
        run: python python.py
      - name: Commit and Push Generated CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data_comp.xlsx
          git commit -m "Auto-generate Test_Main.csv from workflow" || echo "No changes to commit"
          git push
      - name : Triger the email 
        run : python Email.py
